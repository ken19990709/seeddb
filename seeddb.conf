# SeedDB Configuration File
# =========================
#
# This is the main configuration file for SeedDB.
# Lines starting with # are comments.
# Format: key = value

# Network settings
# ----------------
# Address to listen on (0.0.0.0 for all interfaces)
listen_address = 0.0.0.0

# Port to listen on (default: 5432, PostgreSQL compatible)
port = 5432

# Maximum number of concurrent connections
max_connections = 100

# Storage settings
# ----------------
# Directory for database files
data_directory = ./data

# Page size in bytes (default: 8192, same as PostgreSQL)
page_size = 8192

# Number of pages in the buffer pool
buffer_pool_size = 1024

# Percentage of buffer pool frames allocated to the old (cold) LRU sublist
# Default: 37 (matching MySQL InnoDB)
buffer_pool_old_pct = 37

# Logging settings
# ----------------
# Log level: DEBUG, INFO, WARN, ERROR, FATAL
log_level = INFO
